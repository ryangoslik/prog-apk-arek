<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Motoserce 2025</title>
    <script>

    function sprawdzPesel(pesel) {
        if (!/^[0-9]{11}$/.test(pesel)) {
            return false;
        }
        const wagi = [1, 3, 7, 9, 1, 3, 7, 9, 1, 3];
        let suma = 0;
        for (let i = 0; i < 10; i++) {
            suma += parseInt(pesel[i]) * wagi[i];
        }
        let kontrolna = (10 - (suma % 10)) % 10;
        return kontrolna === parseInt(pesel[10]);
    }

    function policzWiek(pesel) {
        let rok = parseInt(pesel.substr(0, 2));
        let miesiac = parseInt(pesel.substr(2, 2));

        if (miesiac > 20) {
            rok += 2000;
            miesiac -= 20;
        } else {
            rok += 1900;
        }
        const teraz = new Date();
        return teraz.getFullYear() - rok;
    }

    function pokazDodatkowe(pokaz) {
        const dodatkowe = document.getElementById('dodatkowe');
        dodatkowe.style.display = pokaz ? 'block' : 'none';
    }

    function walidujFormularz(event) {
        event.preventDefault();

        const pesel = document.getElementById('pesel').value.trim();

        if (!sprawdzPesel(pesel)) {
            alert("Błędny PESEL!");
            pokazDodatkowe(false);
            return;
        }

        const wiek = policzWiek(pesel);

        if (wiek < 18) {
            alert("Nie masz ukończonych 18 lat, rejestracja niemożliwa.");
            pokazDodatkowe(false);
            return;
        } else {
            pokazDodatkowe(true);

            const nazwiskoImie = document.getElementById('nazwisko_imie').value.trim();
            const pojemnosc = document.getElementById('pojemnosc').value.trim();
            const oplata = document.querySelector('input[name="oplata"]:checked');
            const licznik = document.getElementById('licznik').value.trim();
            const prawo = document.getElementById('prawo').value.trim();

            if (nazwiskoImie.length <= 12) {
                alert("Nazwisko i imię muszą mieć więcej niż 12 znaków!");
                return;
            }
            if (pojemnosc === "" || isNaN(pojemnosc) || pojemnosc <= 0) {
                alert("Podaj poprawną pojemność silnika!");
                return;
            }
            if (!oplata) {
                alert("Wybierz, czy opłata została wniesiona!");
                return;
            }
            if (licznik === "" || isNaN(licznik) || licznik < 0) {
                alert("Podaj poprawny stan licznika!");
                return;
            }
            if (prawo === "") {
                alert("Wpisz kategorię prawa jazdy!");
                return;
            }

            const indykator = Math.floor(Math.random() * 10000) + 1;

            alert("Rejestracja udana!\nTwój numer indykatora: " + indykator);
        }
    }
    </script>
</head>
<body>

<h2>Motoserce 2025 - Formularz rejestracji</h2>

<form id="formularz" onsubmit="walidujFormularz(event)">
    <label>PESEL:</label><br>
    <input type="text" id="pesel" required><br><br>

    <div id="dodatkowe" style="display: none;">
        <label>Nazwisko i imię:</label><br>
        <input type="text" id="nazwisko_imie"><br><br>

        <label>Pojemność silnika (cm³):</label><br>
        <input type="number" id="pojemnosc" min="1"><br><br>

        <label>Opłata:</label><br>
        <input type="radio" name="oplata" value="tak"> Tak
        <input type="radio" name="oplata" value="nie"> Nie<br><br>

        <label>Stan licznika (km):</label><br>
        <input type="number" id="licznik" min="0"><br><br>

        <label>Kategoria prawa jazdy:</label><br>
        <input type="text" id="prawo"><br><br>
    </div>

    <input type="submit" value="Wyślij">
</form>

</body>
</html>
